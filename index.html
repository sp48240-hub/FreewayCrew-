<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FreewayCrew | Dance Crew Chennai</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
  text-align: center;
}

header {
  padding: 60px 20px;
  background: linear-gradient(45deg,#ff0057,#00f2ff);
}

h1 {
  font-size: 3em;
}

section {
  padding: 40px 20px;
}

.btn {
  display: inline-block;
  padding: 12px 25px;
  background: #ff0057;
  color: white;
  text-decoration: none;
  border-radius: 25px;
  font-weight: bold;
}

.team img {
  width: 150px;
}

img {
  margin: 10px;
  border-radius: 10px;
}

/* 🔥 FIXED BOOKING FORM */
form {
  display: flex;
  flex-direction: column;
  align-items: center;
}

input, textarea {
  width: 95%;
  max-width: 450px;
  padding: 15px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

button {
  width: 200px;
  padding: 14px;
  background: #00f2ff;
  border: none;
  border-radius: 25px;
  font-size: 16px;
  cursor: pointer;
}

footer {
  background: #111;
  padding: 20px;
}
</style>
</head>

<body>

<header>
  <h1>FreewayCrew</h1>
  <p>All Styles. One Crew. Unlimited Energy 🔥</p>
  <a href="https://wa.me/919094027062" class="btn">Book on WhatsApp</a>
</header>

<section>
  <h2>🔥 Our Performance</h2>
  <iframe width="100%" height="350"
  src="https://www.youtube.com/embed/T6wmOkYZxYo"
  allowfullscreen></iframe>
</section>

<section>
  <h2>About Us</h2>
  <p>FreewayCrew is a Chennai-based dance crew performing hip-hop, freestyle, and fusion.</p>
</section>

<section>
  <h2>Our Team</h2>
  <div class="team">
    <img src="team1.jpg">
    <img src="team2.jpg">
    <img src="performance.jpg">
  </div>
</section>

<section>
  <h2>Our Mentor</h2>
  <img src="mentor.jpg" width="200">
</section>

<section>
  <h2>📩 Quick Booking</h2>

  <form onsubmit="sendToWhatsApp(); return false;">
    <input type="text" id="name" placeholder="Your Name" required>
    <input type="text" id="event" placeholder="Event Type" required>
    <input type="date" id="date" required>
    <input type="text" id="location" placeholder="Location" required>
    <button type="submit">Send Booking</button>
  </form>
</section>

<footer>
  <p>© 2026 FreewayCrew | Chennai</p>
</footer>

<script>
function sendToWhatsApp() {
  var name = document.getElementById("name").value;
  var event = document.getElementById("event").value;
  var date = document.getElementById("date").value;
  var location = document.getElementById("location").value;

  var message = `Hi FreewayCrew!
Name: ${name}
Event: ${event}
Date: ${date}
Location: ${location}`;

  var url = "https://wa.me/919094027062?text=" + encodeURIComponent(message);
  window.open(url, '_blank');
}
</script>

</body>
</html>
